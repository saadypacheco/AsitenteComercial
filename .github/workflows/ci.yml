name: CI

on:
  push:
  pull_request:

jobs:
  # ── 1. Tests de backend (pytest, sin BD viva) ─────────────────────────────
  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalar dependencias
        working-directory: backend
        run: |
          pip install \
            "fastapi>=0.111" \
            "pydantic>=2.7" \
            "pydantic-settings>=2.3" \
            "pyjwt>=2.8" \
            "structlog>=24.1" \
            "httpx>=0.27" \
            "psycopg[binary]>=3.1" \
            "psycopg_pool>=3.2" \
            "pytest>=8.2" \
            "pytest-asyncio>=0.23" \
            "litellm>=1.40"

      - name: Correr tests
        working-directory: backend
        run: python -m pytest -v

  # ── 2. Tests E2E (Playwright contra el stack Docker completo) ─────────────
  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Levantar stack local (DB + backend + frontend)
        run: docker compose -f infra/docker-compose.local.yml up -d

      - name: Esperar a que el frontend compile y esté listo
        # El frontend compila Next.js en el primer arranque (~60-120 s en CI).
        # Polling cada 5 s hasta 5 minutos; si no responde, vuelca los logs.
        run: |
          echo "Esperando frontend en http://localhost:3002..."
          for i in $(seq 1 60); do
            if curl -sf http://localhost:3002/login > /dev/null; then
              echo "✓ Frontend listo tras $((i * 5)) s"
              exit 0
            fi
            echo "  intento $i/60..."
            sleep 5
          done
          echo "✗ Timeout — volcando logs del frontend:"
          docker compose -f infra/docker-compose.local.yml logs frontend --tail 50
          exit 1

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: e2e/package-lock.json

      - name: Instalar dependencias E2E
        working-directory: e2e
        run: npm ci

      - name: Instalar navegador Chromium
        working-directory: e2e
        run: npx playwright install chromium --with-deps

      - name: Correr tests E2E
        working-directory: e2e
        run: npx playwright test

      - name: Subir trazas en caso de fallo
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: e2e/test-results/
          retention-days: 7
